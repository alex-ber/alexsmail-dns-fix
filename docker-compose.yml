services:
  app:
    image: alexsmail-dns-fix-i

    build:
      context: .
      dockerfile: Dockerfile

    container_name: alexsmail-dns-fix

    # Policies: no, on-failure:5, unless-stopped, always
    restart: no

    # ---------------------------------------------------------
    # SERVICE HEALTH & DEPENDENCIES (Commented out templates)
    # ---------------------------------------------------------
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
    #   start_period: 5s # Give the app time to start before the first check
    #   interval: 30s    # How often to check
    #   timeout: 10s     # How long to wait for a response
    #   retries: 3       # How many consecutive failures to become unhealthy

    # depends_on:
    #   postgres_db:
    #     condition: service_healthy

    # ---------------------------------------------------------
    # LOGGING
    # Docker only supports size/count rotation natively.
    # For daily rotation (e.g., 10 days), implement TimedRotatingFileHandler in Python.

    #all_file_handler:
    #    class: logging.handlers.TimedRotatingFileHandler
    #    level: DEBUG
    #    formatter: detail
    #    filename: 'logs/alexsmail-dns-fix.log'
    #    when: midnight
    #    backupCount: 10
    #    delay: True

    # ---------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "100m" # Max 100 megabytes per file
        max-file: "10"   # Keep 10 files max, delete older ones


    # ---------------------------------------------------------
    # HARDWARE BRIDGE: Identity mapping
    # Maps the internal container user to your bare-metal user.
    # Reads HOST_UID/HOST_GID from .env, falling back to 1000:1000.
    # Guarantees that files created by the container (e.g., logs, caches)
    # belong to the host user, preventing permission errors in Kate.
    # ---------------------------------------------------------
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    # Emulation of -i and -t flags from the "docker run -it" command
    # This preserves colored output in logs and proper terminal formatting
    stdin_open: true
    tty: true

    environment:
      # Ensure Python prints directly to the terminal without buffering
      - PYTHONUNBUFFERED=1
      # Disable bytecode generation at runtime to prevent root-owned .pyc files
      # from polluting the host filesystem (since they were already compiled AOT)
      - PYTHONDONTWRITEBYTECODE=1
      # Tell UV to use /tmp for caching, as it's writable by any user
      - UV_CACHE_DIR=/tmp/.uv-cache

    volumes:
      # Transparent mount: Map the bare-metal path directly into the container's WORKDIR.
      # Because your Dockerfile uses "WORKDIR /app", we map it directly there.
      - .:/app

      # Anonymous volume for the Python virtual environment.
      # Protects the container's isolated .venv (built by UV) from being
      # overwritten by the host's bare-metal .venv.
      - /app/.venv

      # Optional: If your app writes local logs or state files, you can map them securely:
      # - ./logs:/app/logs

    # The CMD is already perfectly defined in your Dockerfile:
    # CMD ["uv", "run", "python", "-m", "src.alexsmail_dns_fix.dns_fix"]
    # So we don't need to override the `command` here unless you want a specific dev-mode execution.




  # =========================================================
  # UNIVERSAL POINTER RETRIEVAL DAEMON (Docker Socket Mount)
  # =========================================================
  # mise latest uv
  # 0.11.17
  # docker compose run --rm get-image-hash ghcr.io/astral-sh/uv:0.11.17
  # COPY --from=ghcr.io/astral-sh/uv@sha256:abcd... /uv /uvx /bin/
  # if doesn't found try
  # mise ls-remote uv

  # Retrieves the latest immutable SHA256 digest for ANY Docker image.
  # Will be for ghcr.io/astral-sh/uv:latest
  # Default: docker compose run --rm get-image-hash
  # Custom:  docker compose run --rm get-image-hash ubuntu:24.04
  # For debugging: docker compose run --rm --entrypoint sh get-image-hash
  get-image-hash:
    image: docker:cli
    user: "root"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    profiles:
      - tools
    # Elegantly intercept arguments. $$ escapes the dollar sign from Compose,
    # so that bash inside the container receives the actual $1 and and $IMAGE
    entrypoint:
      - sh
      - -c
      - |
        IMAGE=$${1:-ghcr.io/astral-sh/uv:latest}
        echo "[*] Fetching latest digest for: $$IMAGE"
        docker pull "$$IMAGE" > /dev/null
        echo ""
        echo "Update your Dockerfile with this pointer:"
        docker inspect --format='{{index .RepoDigests 0}}' "$$IMAGE"

    # If you don't pass an argument when running, this will be used
    command: ["ghcr.io/astral-sh/uv:latest"]


  # =========================================================
  # APT POLICY DAEMON (Package Version Resolver)
  # =========================================================
  # Retrieves exact package versions from Ubuntu repositories for hard-pinning.

  # Will be for ca-certificates
  # Default: docker compose run --rm get-pkg-version
  # Custom:  docker compose run --rm get-pkg-version nano git
  # For debugging: docker compose run --rm --entrypoint bash get-pkg-version

  get-pkg-version:
    # We use the floating tag here because the goal is to discover what's
    # currently available before locking the SHA in the Dockerfile.
    image: ubuntu:24.04
    #image: ubuntu@sha256:c4a8d5503dfb2a3eb8ab5f807da5bc69a85730fb49b5cfca2330194ebcc41c7b

    profiles:
      - tools

    # We don't need volumes or user mapping here, as it's a pure stateless query.
    # The entrypoint automatically updates the apt cache quietly, then checks policies.
    # $$@ expands to all arguments passed after the service name.
    entrypoint:
      - sh
      - -c
      - |
        echo "[*] Updating apt repositories quietly..."
        apt-get update -qq
        echo ""
        echo "[*] Available versions for: $$@"
        apt-cache policy "$$@"
      - "_" # The dummy $0 argument for sh

    # The default package to query if no arguments are provided
    command: ["ca-certificates"]


  # =========================================================
  # STATELESS BIRUR DAEMON (Ephemeral Tools)
  # =========================================================
  # To regenerate uv.lock WITHOUT installing uv on the Host OS.
  # Run this service interactively and it will destroy itself after.
  # Usage: dc run --rm update-lock
  # Custom: docker compose run --rm update-uv-lock
  # For debugging: docker compose run --rm --entrypoint bash update-uv-lock

  update-uv-lock:
    image: ghcr.io/astral-sh/uv:python3.13-bookworm-slim
    working_dir: /app

    # HARDWARE BRIDGE: Identity mapping
    # Crucial: Ensures the newly generated uv.lock belongs to you, not root!
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"

    volumes:
      - .:/app

    # Assigning to a "tools" profile prevents this service from starting
    # when you execute a standard `docker compose up`.
    profiles:
      - tools

    # The exact command you want to execute statelessly
    command: ["uv", "lock"]

